---
apiVersion: aap.ansible.com/v1alpha1
kind: AnsibleAutomationPlatform
metadata:
  name: demo
spec:
  route_tls_termination_mechanism: Edge
  service_type: ClusterIP
  ingress_type: Route
  route_host: demo.${SECRET_DOMAIN}
  no_log: true
  hostname: demo.${SECRET_DOMAIN}
  redis_mode: standalone
  redis:
    replicas: 1
  db_fields_encryption_secret: automation-gateway-postgres-secret
  admin_password_secret: admin-password-secret
  api:
    replicas: 1
  database:
    database_secret: automation-gateway-postgres-secret
  controller:
    postgres_configuration_secret: automation-controller-postgres-secret
    secret_key_secret: automation-controller-postgres-secret
    control_plane_ee_image: registry.redhat.io/ansible-automation-platform-27/ee-supported-rhel9@sha256:c640e8f7478f6a38acbc610acf831c05378122b7873f18263cb648f79b6e8850
    replicas: 1
  eda:
    database:
      database_secret: eda-controller-postgres-secret
    db_fields_encryption_secret: eda-controller-postgres-secret
    scheduler:
      replicas: 1
    default_worker:
      replicas: 1
    activation_worker:
      replicas: 1
    redis:
      replicas: 1
    event_stream:
      replicas: 1
  hub:
    storage_type: S3
    object_storage_s3_secret: automation-hub-s3-secret
    postgres_configuration_secret: automation-hub-postgres-secret
    secret_key_secret: automation-hub-postgres-secret
    api:
      replicas: 1
    content:
      replicas: 1
    web:
      replicas: 1
    worker:
      replicas: 1
  lightspeed:
    disabled: false
    chatbot_config_secret_name: chatbot-configuration-secret
    database: { database_secret: chatbot-postgres-secret }
    db_fields_encryption_secret: chatbot-postgres-secret
  mcp:
    disabled: false
    allow_write_operations: true
    public_base_url: https://demo.ansible.show
    route_host: ansible-mcp.ansible.show
