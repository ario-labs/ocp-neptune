---
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  name: 99-master-neptune-network-guard
  labels:
    machineconfiguration.openshift.io/role: master
spec:
  config:
    ignition:
      version: 3.2.0
    storage:
      files:
        - path: /usr/local/sbin/ensure-neptune-network
          mode: 493
          overwrite: true
          contents:
            source: data:text/plain;charset=utf-8;base64,
        - path: /etc/systemd/system/ensure-neptune-network.service
          mode: 420
          overwrite: true
          contents:
            source: data:text/plain;charset=utf-8;base64,
    systemd:
      units:
        - name: ensure-neptune-network.service
          enabled: true
